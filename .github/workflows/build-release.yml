name: Build CoreDNS Release

on:
  workflow_dispatch:
    inputs:
      coredns_tag:
        description: "指定要构建的 CoreDNS tag，留空则自动取最新"
        required: false
        type: string
  schedule:
    - cron: "23 2 * * *"

permissions:
  contents: write

concurrency:
  group: build-coredns-release
  cancel-in-progress: false

jobs:
  discover:
    name: Discover CoreDNS Tag
    runs-on: ubuntu-latest
    outputs:
      coredns_tag: ${{ steps.meta.outputs.coredns_tag }}
      latest_coredns_tag: ${{ steps.meta.outputs.latest_coredns_tag }}
      current_repo_tag: ${{ steps.meta.outputs.current_repo_tag }}
      is_latest_target: ${{ steps.meta.outputs.is_latest_target }}
      should_build: ${{ steps.meta.outputs.should_build }}
    steps:
      - name: Compare latest semver tags
        id: meta
        run: |
          set -euo pipefail

          latest_semver_tag() {
            local repo_url="$1"
            git ls-remote --tags --refs "${repo_url}" \
              | awk -F/ '{print $3}' \
              | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' \
              | sort -V \
              | tail -n 1
          }

          latest_coredns_tag="$(latest_semver_tag https://github.com/coredns/coredns.git)"
          tag="${{ inputs.coredns_tag }}"
          if [[ -z "${tag}" ]]; then
            tag="${latest_coredns_tag}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "failed to resolve a CoreDNS tag" >&2
            exit 1
          fi

          current_repo_tag="$(
            latest_semver_tag "https://github.com/${GITHUB_REPOSITORY}.git" || true
          )"
          is_latest_target=false
          if [[ "${tag}" == "${latest_coredns_tag}" ]]; then
            is_latest_target=true
          fi
          should_build=true

          if [[ -n "${current_repo_tag}" ]]; then
            latest="$(printf '%s\n%s\n' "${current_repo_tag}" "${tag}" | sort -V | tail -n 1)"
            if [[ "${latest}" == "${current_repo_tag}" ]]; then
              should_build=false
            fi
          fi

          {
            echo "coredns_tag=${tag}"
            echo "latest_coredns_tag=${latest_coredns_tag}"
            echo "current_repo_tag=${current_repo_tag}"
            echo "is_latest_target=${is_latest_target}"
            echo "should_build=${should_build}"
          } >> "${GITHUB_OUTPUT}"

      - name: Print comparison
        run: |
          echo "CoreDNS latest target tag: ${{ steps.meta.outputs.coredns_tag }}"
          echo "Resolved latest CoreDNS tag: ${{ steps.meta.outputs.latest_coredns_tag }}"
          echo "Current repo latest tag: ${{ steps.meta.outputs.current_repo_tag }}"
          echo "Is latest target: ${{ steps.meta.outputs.is_latest_target }}"
          echo "Should build: ${{ steps.meta.outputs.should_build }}"

  build-and-release:
    name: Build And Publish
    needs: discover
    if: needs.discover.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.2"

      - name: Build release assets
        run: |
          set -euo pipefail
          ./scripts/build-release.sh "${{ needs.discover.outputs.coredns_tag }}" "${RUNNER_TEMP}/release"

      - name: Show release assets
        run: ls -lah "${RUNNER_TEMP}/release"

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.discover.outputs.coredns_tag }}
          name: ${{ needs.discover.outputs.coredns_tag }}
          make_latest: ${{ needs.discover.outputs.is_latest_target == 'true' }}
          generate_release_notes: false
          body: |
            Auto-built from CoreDNS `${{ needs.discover.outputs.coredns_tag }}`.

            Extra plugins:
            - `qist/hostlist`
            - `qist/speedcheck`
            - `qist/resolve`
          files: ${{ runner.temp }}/release/*
        env:
          GITHUB_TOKEN: ${{ github.token }}
